name: Apply no-live-candidate fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'txline/live-no-candidate-status-20260717'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: txline/live-no-candidate-status-20260717
          fetch-depth: 0
      - name: Treat empty auto-discovery as missing evidence
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/txline/live-observer.ts')
          text = path.read_text(encoding='utf-8')

          text = text.replace(
              '): NormalizedFixture {\n  const selectable = fixtures.filter(',
              '): NormalizedFixture | undefined {\n  const selectable = fixtures.filter(',
              1,
          )

          old_no_candidate = '''  if (candidate === undefined) {
            throw new LiveObserverError(
              "NO_LIVE_CANDIDATE",
              "No selectable fixture was found inside the configured live observation window."
            );
          }
          return candidate;'''
          new_no_candidate = '''  return candidate;'''
          if text.count(old_no_candidate) != 1:
              raise SystemExit('Expected no-candidate block exactly once')
          text = text.replace(old_no_candidate, new_no_candidate)

          text = text.replace(
              '  status: "PASS" | "NOT_OBSERVED";\n  commitSha: string;',
              '  status: "PASS" | "NOT_OBSERVED";\n  baselineReady: boolean;\n  commitSha: string;',
              1,
          )
          text = text.replace(
              '    "Fixture baseline: PASS",',
              '    `Fixture baseline: ${input.baselineReady ? "PASS" : "NOT RUN"}`,',
              1,
          )

          fixture_marker = '''  const fixture = selectFixture(
            fixtures,
            now,
            fixtureWindowHours,
            options.fixtureId
          );

          const controller = new AbortController();'''
          fixture_replacement = '''  const fixture = selectFixture(
            fixtures,
            now,
            fixtureWindowHours,
            options.fixtureId
          );
          if (fixture === undefined) {
            const receipt = renderLiveObserverReceipt({
              network: options.network,
              status: "NOT_OBSERVED",
              baselineReady: false,
              commitSha: resolveCommitSha(options.commitSha),
              verifiedAt: new Date(now).toISOString()
            });
            validateLiveObserverReceipt(receipt);
            return { status: "NOT_OBSERVED", receipt };
          }

          const controller = new AbortController();'''
          if text.count(fixture_marker) != 1:
              raise SystemExit('Expected fixture selection marker exactly once')
          text = text.replace(fixture_marker, fixture_replacement)

          receipt_marker = '''  const receipt = renderLiveObserverReceipt({
            network: options.network,
            status,
            commitSha: resolveCommitSha(options.commitSha),'''
          receipt_replacement = '''  const receipt = renderLiveObserverReceipt({
            network: options.network,
            status,
            baselineReady: true,
            commitSha: resolveCommitSha(options.commitSha),'''
          if text.count(receipt_marker) != 1:
              raise SystemExit('Expected receipt marker exactly once')
          text = text.replace(receipt_marker, receipt_replacement)

          path.write_text(text, encoding='utf-8')
          Path('.github/workflows/apply-live-no-candidate-fix.yml').unlink()
          PY
      - name: Commit no-candidate fix
        shell: bash
        run: |
          git config user.name "bit-nexus-labs"
          git config user.email "289002433+bit-nexus-labs@users.noreply.github.com"
          git add -A
          git commit -m "Report empty live window as not observed"
          git push origin HEAD:txline/live-no-candidate-status-20260717
