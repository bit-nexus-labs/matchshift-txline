name: Apply no-live-candidate fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'txline/live-no-candidate-status-20260717'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: txline/live-no-candidate-status-20260717
          fetch-depth: 0
      - name: Treat empty auto-discovery as missing evidence
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/txline/live-observer.ts')
          text = path.read_text(encoding='utf-8')

          old_return_type = '): NormalizedFixture {\n  const selectable = fixtures.filter('
          new_return_type = '): NormalizedFixture | undefined {\n  const selectable = fixtures.filter('
          if text.count(old_return_type) != 1:
              raise SystemExit('Expected selectFixture return type exactly once')
          text = text.replace(old_return_type, new_return_type)

          select_start = text.find('function selectFixture(')
          block_start = text.find('  if (candidate === undefined) {', select_start)
          return_start = text.find('  return candidate;', block_start)
          if select_start < 0 or block_start < 0 or return_start < 0:
              raise SystemExit('No-candidate markers were not found')
          text = text[:block_start] + text[return_start:]

          old_interface = '  status: "PASS" | "NOT_OBSERVED";\n  commitSha: string;'
          new_interface = '  status: "PASS" | "NOT_OBSERVED";\n  baselineReady: boolean;\n  commitSha: string;'
          if text.count(old_interface) != 1:
              raise SystemExit('Expected receipt input interface exactly once')
          text = text.replace(old_interface, new_interface)

          old_baseline = '    "Fixture baseline: PASS",'
          new_baseline = '    `Fixture baseline: ${input.baselineReady ? "PASS" : "NOT RUN"}`,'
          if text.count(old_baseline) != 1:
              raise SystemExit('Expected fixed baseline receipt line exactly once')
          text = text.replace(old_baseline, new_baseline)

          fixture_call = text.find('  const fixture = selectFixture(')
          controller_marker = text.find('\n\n  const controller = new AbortController();', fixture_call)
          if fixture_call < 0 or controller_marker < 0:
              raise SystemExit('Fixture/controller insertion markers were not found')
          no_candidate = '''
          if (fixture === undefined) {
            const receipt = renderLiveObserverReceipt({
              network: options.network,
              status: "NOT_OBSERVED",
              baselineReady: false,
              commitSha: resolveCommitSha(options.commitSha),
              verifiedAt: new Date(now).toISOString()
            });
            validateLiveObserverReceipt(receipt);
            return { status: "NOT_OBSERVED", receipt };
          }'''
          text = text[:controller_marker] + no_candidate + text[controller_marker:]

          old_receipt_call = '    status,\n    commitSha: resolveCommitSha(options.commitSha),'
          new_receipt_call = '    status,\n    baselineReady: true,\n    commitSha: resolveCommitSha(options.commitSha),'
          if text.count(old_receipt_call) != 1:
              raise SystemExit('Expected normal receipt call exactly once')
          text = text.replace(old_receipt_call, new_receipt_call)

          path.write_text(text, encoding='utf-8')
          Path('.github/workflows/apply-live-no-candidate-fix.yml').unlink()
          PY
      - name: Commit no-candidate fix
        shell: bash
        run: |
          git config user.name "bit-nexus-labs"
          git config user.email "289002433+bit-nexus-labs@users.noreply.github.com"
          git add -A
          git commit -m "Report empty live window as not observed"
          git push origin HEAD:txline/live-no-candidate-status-20260717
