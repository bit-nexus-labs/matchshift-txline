name: Apply smoke assertion fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'txline/integration-smoke-20260717'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: txline/integration-smoke-20260717
          fetch-depth: 0
      - name: Apply exact event isolation assertion
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/txline/smoke.ts')
          text = path.read_text(encoding='utf-8')
          start_marker = '  const futureEventIds = futureRecords'
          end_marker = '  const verifiedAt = new Date(now).toISOString();'
          start = text.find(start_marker)
          end = text.find(end_marker, start)
          if start < 0 or end < 0:
              raise SystemExit('Smoke assertion markers were not found')
          replacement = '''  const futureEventIds = new Set(
            futureRecords
              .filter((record) => record.kind === "event")
              .map((record) => record.recordId)
          );
          const earlyVisibleEventIds = new Set(
            earlyState.events.map((event) => event.eventId)
          );

          if (
            earlyRecords.some((record) => record.sourceTimestamp > earlyCursor) ||
            earlyState.events.some((event) => event.sourceTimestamp > earlyCursor) ||
            futureRecords.length === 0 ||
            [...futureEventIds].some((eventId) => earlyVisibleEventIds.has(eventId)) ||
            earlyState.session.visibilityCursor >= liveState.session.visibilityCursor
          ) {
            throw new TxlineSmokeError(
              "FUTURE_ISOLATION_FAILED",
              "The early viewer session received information beyond its visibility cursor."
            );
          }

          '''
          path.write_text(text[:start] + replacement + text[end:], encoding='utf-8')
          Path('.github/workflows/apply-smoke-fix.yml').unlink()
          PY
      - name: Commit smoke assertion fix
        shell: bash
        run: |
          git config user.name "bit-nexus-labs"
          git config user.email "289002433+bit-nexus-labs@users.noreply.github.com"
          git add -A
          git commit -m "Fix exact future-event isolation assertion"
          git push origin HEAD:txline/integration-smoke-20260717
