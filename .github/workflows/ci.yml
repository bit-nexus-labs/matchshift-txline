name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --reporter=silent
      - run: pnpm typecheck
      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          pnpm test 2>&1 | tee test-output.log
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.log
      - name: Parse Windows evidence runner
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "./scripts/run-txline-evidence.ps1"),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }
      - run: pnpm build

  container:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - run: docker build --tag matchshift:ci .
      - run: |
          docker run --detach --rm --name matchshift-ci \
            --publish 127.0.0.1:3000:3000 \
            --env TXLINE_MODE=synthetic \
            matchshift:ci
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:3000/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs matchshift-ci
          exit 1
      - if: always()
        run: docker stop matchshift-ci >/dev/null 2>&1 || true
