name: Apply UI polish

on:
  push:
    branches:
      - ui/demo-copy-and-time-polish-20260716

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui/demo-copy-and-time-polish-20260716
          fetch-depth: 0
      - name: Apply targeted copy and time-label fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/ui/demo-page.ts')
          text = path.read_text(encoding='utf-8')

          old_copy = 'Start two isolated server-side sessions: one at the live edge and one six minutes behind. Then move the personal cursor and watch information unlock in order.'
          new_copy = 'Start two isolated server-side sessions: one at the live edge and one at an earlier personal cursor. Then move the personal cursor and watch information unlock in order.'

          old_time = '        el[prefix + "-minute"].textContent = "Viewer minute " + state.session.viewerMinute;'
          new_time = '''        var viewerTime = model.fixture
            ? minuteLabel((session.visibilityCursor - model.fixture.kickoffTimestamp) / 60000)
            : String(state.session.viewerMinute).padStart(2, "0") + ":00";
        el[prefix + "-minute"].textContent = "Viewer time " + viewerTime;'''

          if text.count(old_copy) != 1:
              raise SystemExit('Expected hero copy exactly once')
          if text.count(old_time) != 1:
              raise SystemExit('Expected viewer minute assignment exactly once')

          text = text.replace(old_copy, new_copy)
          text = text.replace(old_time, new_time)
          path.write_text(text, encoding='utf-8')

          Path('.github/workflows/apply-ui-polish.yml').unlink()
          PY
      - name: Commit targeted UI polish
        shell: bash
        run: |
          git config user.name "bit-nexus-labs"
          git config user.email "289002433+bit-nexus-labs@users.noreply.github.com"
          git add -A
          git commit -m "Polish judge demo copy and exact viewer time"
          git push origin HEAD:ui/demo-copy-and-time-polish-20260716
