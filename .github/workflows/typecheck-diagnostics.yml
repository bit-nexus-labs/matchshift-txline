name: Typecheck diagnostics

on:
  push:
    branches:
      - txline/integration-smoke-20260717

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Print TypeScript diagnostics
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate
          pnpm install --frozen-lockfile --reporter=silent
          pnpm typecheck 2>&1 | tail -80
