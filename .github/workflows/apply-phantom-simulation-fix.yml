name: Apply Phantom simulation compatibility fix

on:
  push:
    branches:
      - txline/phantom-activation-helper-20260717

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: txline/phantom-activation-helper-20260717
          fetch-depth: 0
      - name: Use direct signed-transaction simulation RPC
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/txline/phantom-activation.ts')
          text = path.read_text(encoding='utf-8')
          old = '''    const signedTransaction = await provider.signTransaction(transaction);
              const simulation = await connection.simulateTransaction(signedTransaction, {
                commitment: "confirmed",
                sigVerify: true
              });
              if (simulation.value.err) {
                elements.subscribe.disabled = false;
                throw new Error("Solana simulation failed. No transaction was sent.");
              }
          '''
          new = '''    const signedTransaction = await provider.signTransaction(transaction);
              const simulationResponse = await fetch(config.rpcOrigin, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  jsonrpc: "2.0",
                  id: 1,
                  method: "simulateTransaction",
                  params: [
                    bytesToBase64(signedTransaction.serialize()),
                    {
                      encoding: "base64",
                      commitment: "confirmed",
                      sigVerify: true
                    }
                  ]
                })
              });
              const simulationPayload = await simulationResponse
                .json()
                .catch(() => undefined);
              if (
                !simulationResponse.ok ||
                simulationPayload?.error ||
                simulationPayload?.result?.value?.err
              ) {
                elements.subscribe.disabled = false;
                throw new Error("Solana simulation failed. No transaction was sent.");
              }
          '''
          if text.count(old) != 1:
              raise SystemExit('Expected simulation block exactly once')
          path.write_text(text.replace(old, new), encoding='utf-8')
          Path('.github/workflows/apply-phantom-simulation-fix.yml').unlink()
          PY
      - name: Commit compatibility fix
        shell: bash
        run: |
          git config user.name "bit-nexus-labs"
          git config user.email "289002433+bit-nexus-labs@users.noreply.github.com"
          git add -A
          git commit -m "Use compatible signed transaction simulation"
          git push origin HEAD:txline/phantom-activation-helper-20260717
